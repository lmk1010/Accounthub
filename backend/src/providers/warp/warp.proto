// Warp Multi-Agent Protocol Definition
// Package: warp.multi_agent.v1
// 基于 protoc --decode_raw 解析 tool-1.bin 和 tool-2.bin 确认的结构

syntax = "proto3";

package warp.multi_agent.v1;

// ==================== 请求结构 ====================

// 顶层请求
message Request {
  TaskContext task_context = 1;    // 历史会话上下文
  InputContext input_context = 2;  // 当前环境信息
  Settings settings = 3;           // 设置/配置
  Metadata metadata = 4;           // 元数据
}

// 任务上下文
message TaskContext {
  Task task = 1;
}

// 任务
message Task {
  string task_id = 1;           // UUID
  string description = 2;       // 任务描述
  // field 3, 4 未知
  repeated Message messages = 5; // 历史消息列表 (注意是 field 5)
}

// ==================== 核心消息结构 ====================

// 消息 - 这是最重要的结构
message Message {
  string message_id = 1;        // UUID

  // 消息内容 (oneof，根据消息类型只有一个存在)
  UserQuery user_query = 2;         // 用户输入
  AgentOutput agent_output = 3;     // AI 回复 *** 文本在这里 ***
  ToolCall tool_call = 4;           // 工具调用
  ToolResult tool_result = 5;       // 工具执行结果

  bytes metadata = 6;               // 元数据
  string encoded_id = 7;            // Base64 编码的 ID

  // 会话标识
  string conversation_id = 11;      // 会话 ID
  string task_id = 13;              // 任务 ID
  Timestamp timestamp = 14;         // 时间戳
}

// 用户查询/输入
message UserQuery {
  string query = 1;                 // 用户输入文本
  InputContext context = 2;         // 输入时的环境上下文
  // field 3 未知
  string attachment = 4;            // 附件 (通常为空)
  int32 flag = 5;                   // 标志 (值为 1)
}

// AI 输出/回复 *** 这是我们需要提取的 ***
message AgentOutput {
  string text = 1;                  // AI 回复文本内容
}

// ==================== 工具调用 ====================

// 工具调用
message ToolCall {
  string tool_call_id = 1;          // 工具调用 ID (如 "toolu_01MhyQpgkEH89g5w48pqFk7h")

  // 工具类型 (oneof)
  // field 2-5 为其他工具类型
  WriteToFile write_to_file = 6;    // 写入文件
  // field 7-13 为其他工具类型
  ToolCallMetadata metadata = 14;   // 工具调用元数据
}

// 写入文件工具
message WriteToFile {
  string description = 1;           // 操作描述
  // field 2 未知
  FileOperation file_operation = 3; // 文件操作详情
}

// 文件操作
message FileOperation {
  string file_path = 1;             // 文件路径
  string content = 2;               // 文件内容
}

// 工具调用元数据
message ToolCallMetadata {
  string parent_message_id = 1;     // 父消息 ID
}

// 工具执行结果
message ToolResult {
  string tool_call_id = 1;          // 对应的工具调用 ID
  // field 2-10 为其他结果字段
  InputContext context = 11;        // 执行时的环境上下文
  // field 18 包含结果详情
  ToolResultDetails details = 18;
}

message ToolResultDetails {
  string result = 2;                // 结果内容
}

// ==================== 输入上下文 ====================

message InputContext {
  Directory directory = 1;
  OperatingSystem os = 2;
  Shell shell = 3;
  Timestamp current_time = 4;
}

message Directory {
  string working_dir = 1;           // 工作目录
  string home_dir = 2;              // 主目录
}

message OperatingSystem {
  // field 9 包含 OS 信息 (如 0x534f6361 = "SOca" 即 macOS)
  fixed32 os_code = 9;
}

message Shell {
  string name = 1;                  // 如 "zsh"
  string version = 2;               // 如 "5.9"
}

message Timestamp {
  int64 seconds = 1;                // Unix 时间戳秒
  int32 nanos = 2;                  // 纳秒部分
}

// ==================== SSE 响应结构 ====================

// SSE 响应顶层 (ResponseEvent)
// 根据从 Warp 二进制提取的信息
message ResponseEvent {
  oneof type {
    StreamInit stream_init = 1;
    ClientActions client_actions = 2;   // 或 ServerEvent
    StreamFinished stream_finished = 3;
  }
}

// 客户端动作列表
message ClientActions {
  repeated ClientAction actions = 1;
}

// 单个客户端动作
message ClientAction {
  oneof action {
    // field 1-3 为其他动作类型
    AppendToMessageContent append_to_message_content = 4;  // 追加消息内容
    // field 5+ 为其他动作类型
    AddMessagesToTask add_messages_to_task = 8;  // 添加消息到任务 (根据日志 field_8)
  }
}

// 追加消息内容 (文本增量)
message AppendToMessageContent {
  Message message = 1;
}

// 添加消息到任务
message AddMessagesToTask {
  repeated Message messages = 1;
}

// 流初始化
message StreamInit {
  string conversation_id = 1;
  string task_id = 2;
}

// 流结束
message StreamFinished {
  string reason = 1;
  TokenUsage token_usage = 2;
}

message TokenUsage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
}

// ==================== 设置/元数据 ====================

message Settings {
  ModelConfig model = 1;
  // ... 其他配置字段
}

message ModelConfig {
  string model_name = 1;            // 如 "claude-4-5-sonnet"
  string agent_type = 4;            // 如 "cli-agent-auto"
}

message Metadata {
  string conversation_id = 1;
  repeated Property properties = 2;
}

message Property {
  string name = 1;
  PropertyValue value = 2;
}

message PropertyValue {
  string string_value = 3;
  int32 int_value = 4;
}
